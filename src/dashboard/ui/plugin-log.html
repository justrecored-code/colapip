<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
:root { --bg:#0b0b12; --surface:#14141e; --border:#2e2e44; --text:#cdd6f4; --text2:#9898b0; --accent:#8b7cf6; --accent2:#a78bfa; --green:#4ade80; --red:#f87171; --yellow:#fcd34d; }
body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; margin: 0; font-size: 13px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-shrink: 0; }
h3 { color: var(--accent2); margin: 0; font-size: 15px; }
.status { font-size: 11px; padding: 3px 10px; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; }
.status.running { background: rgba(74,222,128,0.2); color: var(--green); }
.status.running .status-dot { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.5); animation: pulse 1.5s infinite; }
.status.stopped, .status.idle { background: rgba(248,113,113,0.2); color: var(--red); }
.status.stopped .status-dot, .status.idle .status-dot { background: var(--red); }
.status.error { background: rgba(248,113,113,0.2); color: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.info { font-size: 11px; color: var(--text2); margin-left: auto; }
.log { flex: 1; white-space: pre-wrap; overflow-y: auto; font-family: "SF Mono", Menlo, monospace; font-size: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text2); box-shadow: inset 0 2px 8px rgba(0,0,0,0.5); }
</style></head><body>
<div class="header">
  <h3 id="plugin-name"></h3>
  <span id="status" class="status idle"><span class="status-dot"></span>检测中...</span>
  <span class="info" id="info"></span>
</div>
<div class="log" id="log">加载中...</div>
<script>
const PLUGIN = new URLSearchParams(location.search).get("name") || "unknown";
document.getElementById("plugin-name").textContent = PLUGIN;
document.title = PLUGIN;

async function load() {
  try {
    const r = await fetch("/api/plugins/" + PLUGIN + "/log");
    const el = document.getElementById("log");
    if (r.ok) { el.textContent = await r.text(); el.scrollTop = el.scrollHeight; }
    else el.textContent = "(暂无日志)";
  } catch { document.getElementById("log").textContent = "加载失败"; }
}

async function refreshStatus() {
  try {
    const r = await (await fetch("/api/plugins")).json();
    const p = r.find(x => x.name === PLUGIN);
    const s = document.getElementById("status");
    const st = p?.status || "idle";
    const isActive = st === "running";
    s.innerHTML = `<span class="status-dot"></span>${st}`;
    s.className = "status " + (isActive ? "running" : (st === "error" ? "error" : "stopped"));
    document.getElementById("info").textContent = isActive ? "运行中" : "";
  } catch {}
}

load(); setInterval(load, 3000);
refreshStatus(); setInterval(refreshStatus, 10000);
</script></body></html>
